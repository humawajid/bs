<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medifine | Complete Health Care</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar-brand {
      font-size: 28px;
      font-weight: bold;
      color: #198754 !important;
    }

    .hero-section {
      padding: 50px 0;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 700;
    }

    .hero-text {
      font-size: 18px;
      color: #6c757d;
    }

    .btn-appointment {
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 50px;
    }

    footer {
      background-color: #f8f9fa;
      padding: 20px 0;
      text-align: center;
      margin-top: 60px;
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 32px;
      }

      .hero-section {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">Medifine</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Our Services</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="container">
      <div class="row align-items-center">

        <!-- Text Column -->
        <div class="col-lg-6 mb-4 mb-lg-0">
          <h1 class="hero-title mb-4">
            Complete Health Care Solution for Everyone
          </h1>
          <p class="hero-text mb-4">
            We provide professional medical services with experienced doctors,
            modern equipment, and compassionate care. Your health and wellbeing
            are our top priority.
          </p>
          <a href="#" class="btn btn-success btn-appointment">
            Make Appointment
          </a>
        </div>

        <!-- Image Column -->
        <div class="col-lg-6 text-center">
          <img src="./Group 6.png" class="img-fluid" style="height: 80vh;" alt="Healthcare Illustration">
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <!-- <footer>
    <div class="container">
      <p class="mb-0">© 2026 Medifine. All Rights Reserved.</p>
    </div>
  </footer> -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
